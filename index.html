    border-radius:16px;
    padding:14px;
    cursor:pointer;

    border-color:#ffd1da;
    box-shadow: 0 4px 14px rgba(255,59,92,0.08);
    transform: translateY(-1px);
  }

    width:32px;
    height:32px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;

    color:#a0a0a5;

      { name: '스타워즈 콜라보 굿즈', priceMin: 800, priceMax: 2500, thumb:'🚀', desc:'일본 한정으로 나오는 콜라보 상품' },
    ]
  },
];

const tabsEl = document.getElementById('tabs');
const titleEl = document.getElementById('categoryTitle');
const subEl = document.getElementById('categorySub');
const listEl = document.getElementById('rankingList');

function renderTabs(activeId) {
  tabsEl.innerHTML = categories.map(c => `
    <button class="tab-btn ${c.id === activeId ? 'active' : ''}" data-id="${c.id}">
      ${c.emoji} ${c.name}
    </button>
  `).join('');

  tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => showCategory(btn.dataset.id));
  });
}

function showCategory(id) {
  const category = categories.find(c => c.id === id);
  titleEl.textContent = `${category.emoji} ${category.name} 랭킹`;
  subEl.textContent = `총 ${category.products.length}개 · 많이 사가는 순위대로 정리했어요`;

  listEl.innerHTML = category.products.map((p, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
    return `
      <div class="product-card" data-cat="${category.id}" data-idx="${i}">
        <div class="rank-badge ${rankClass}">${rank}</div>
        <div class="thumb">${p.thumb}</div>
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="price">¥${p.priceMin.toLocaleString()} ~ ¥${p.priceMax.toLocaleString()}</div>
        </div>
        <div class="chevron">›</div>
      </div>
    `;
  }).join('');

  renderTabs(id);
}

showCategory(categories[0].id);
</script>

</body>
</html>
