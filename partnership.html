<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤝 제휴 문의</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "맑은 고딕", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            width: 500px;
            max-width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #ff9800;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f57c00;
        }

        #status {
            margin-top: 18px;
            text-align: center;
            font-weight: bold;
        }

        #status.success {
            color: #2e7d32;
        }

        #status.error {
            color: #c62828;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="display:inline-block;margin-bottom:16px;color:#333;font-weight:bold;text-decoration:none;">← 돈키호테 쇼핑 랭킹으로 돌아가기</a>
    <h1>🤝 제휴 문의</h1>
    <p class="subtitle">제휴에 관심 있으시면 아래 양식을 작성해 주세요.</p>

    <form id="partnership-form" action="https://formspree.io/f/xjgnyoay" method="POST">
        <label for="company">회사/이름 *</label>
        <input type="text" id="company" name="company" required>

        <label for="email">이메일 *</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone">

        <label for="message">문의 내용 *</label>
        <textarea id="message" name="message" required placeholder="제휴 목적과 내용을 자유롭게 작성해 주세요."></textarea>

        <button type="submit">문의 보내기</button>

        <div id="status"></div>
    </form>
</div>

<script>
const form = document.getElementById("partnership-form");
const status = document.getElementById("status");

form.addEventListener("submit", async function(e){
    e.preventDefault();
    status.textContent = "전송 중...";
    status.className = "";

    try {
        const response = await fetch(form.action, {
            method: "POST",
            body: new FormData(form),
            headers: { "Accept": "application/json" }
        });

        if(response.ok){
            status.textContent = "문의가 전송되었습니다. 감사합니다!";
            status.className = "success";
            form.reset();
        } else {
            status.textContent = "전송에 실패했습니다. 잠시 후 다시 시도해 주세요.";
            status.className = "error";
        }
    } catch (err) {
        status.textContent = "전송 중 오류가 발생했습니다.";
        status.className = "error";
    }
});
</script>

</body>
</html>
